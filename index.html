<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Razz Gaming Studio</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
:root{
--bg:#09090b;--sf:#111114;--el:#19191f;--bd:rgba(255,255,255,.06);--bdl:rgba(255,255,255,.1);
--g:#c8a84c;--gl:#e2cc7a;--gd:rgba(200,168,76,.12);--gg:rgba(200,168,76,.2);
--ac:#6c5ce7;--acd:rgba(108,92,231,.12);--r:#e74c3c;--rd:rgba(231,76,60,.1);
--gr:#27ae60;--grd:rgba(39,174,96,.12);
--t:#f0eff4;--t2:#9896a8;--t3:#55536a;
--R:16px;--Rs:12px;
--f:'Inter',-apple-system,sans-serif;--fd:'DM Sans','Inter',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--f);background:var(--bg);color:var(--t);min-height:100vh;position:relative;overflow-x:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:0;height:0}
button{font-family:var(--fd);cursor:pointer;border:none;outline:none}
input{font-family:var(--f);outline:none}

/* ═══ ANIMATIONS ═══ */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
@keyframes glow{0%,100%{box-shadow:0 0 30px var(--gg)}50%{box-shadow:0 0 60px var(--gg),0 0 90px rgba(200,168,76,.08)}}
@keyframes dotPulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes gradientMove{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes checkPop{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes ripple{to{transform:scale(4);opacity:0}}

.anim-up{animation:fadeUp .5s ease-out both}
.anim-in{animation:fadeIn .4s ease-out both}
.anim-slide{animation:slideIn .5s ease-out both}
.anim-scale{animation:scaleIn .4s ease-out both}
.d1{animation-delay:.05s}.d2{animation-delay:.1s}.d3{animation-delay:.15s}
.d4{animation-delay:.2s}.d5{animation-delay:.25s}.d6{animation-delay:.3s}

/* ═══ SPLASH ═══ */
#splash{position:fixed;inset:0;z-index:300;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .8s,visibility .8s}
#splash.hide{opacity:0;visibility:hidden;pointer-events:none}
#splash .slogo{width:80px;height:80px;border-radius:22px;background:linear-gradient(135deg,var(--g),#b8943f);display:flex;align-items:center;justify-content:center;margin-bottom:28px;animation:glow 2.5s infinite,fadeUp .8s ease-out}
#splash h1{font-family:var(--fd);font-size:42px;font-weight:800;color:var(--g);letter-spacing:6px;margin-bottom:6px;animation:fadeUp .8s ease-out .15s both}
#splash p{color:var(--t3);font-size:11px;letter-spacing:6px;text-transform:uppercase;animation:fadeUp .8s ease-out .25s both}
#splash .sbar{width:120px;height:2px;background:var(--el);border-radius:1px;margin-top:32px;overflow:hidden;animation:fadeIn 1s ease-out .5s both}
#splash .sbar-fill{height:100%;width:0;background:linear-gradient(90deg,var(--g),var(--gl));border-radius:1px;transition:width 1.5s ease-in-out}

/* ═══ LOGIN/ONBOARDING ═══ */
#loginScreen{position:fixed;inset:0;z-index:200;background:var(--bg);display:none;flex-direction:column;overflow:hidden}
#loginScreen.show{display:flex}
.login-bg{position:absolute;inset:0;overflow:hidden}
.login-bg .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.15}
.login-bg .orb1{width:300px;height:300px;background:var(--g);top:-50px;right:-80px;animation:float 6s ease-in-out infinite}
.login-bg .orb2{width:200px;height:200px;background:var(--ac);bottom:100px;left:-60px;animation:float 8s ease-in-out infinite 1s}
.login-content{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;padding:0 28px}
.login-top{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
.login-logo{width:72px;height:72px;border-radius:20px;background:linear-gradient(135deg,var(--g),#b8943f);display:flex;align-items:center;justify-content:center;margin-bottom:28px;box-shadow:0 12px 48px var(--gg)}
.login-top h1{font-family:var(--fd);font-size:36px;font-weight:800;color:var(--g);letter-spacing:4px;margin-bottom:6px}
.login-top .sub{color:var(--t3);font-size:12px;letter-spacing:4px;text-transform:uppercase;margin-bottom:40px}
.login-top .tagline{color:var(--t2);font-size:15px;line-height:1.7;max-width:300px;margin-bottom:48px}
.login-features{display:flex;gap:24px;justify-content:center;margin-bottom:48px}
.login-feat{text-align:center}
.login-feat .lf-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 8px;border:1px solid var(--bd)}
.login-feat .lf-label{color:var(--t2);font-size:11px;font-weight:500}
.login-bottom{padding-bottom:40px}
.login-input-group{margin-bottom:16px}
.login-input{width:100%;padding:16px 18px;border-radius:14px;border:1px solid var(--bd);background:var(--sf);color:var(--t);font-size:15px;transition:border-color .2s}
.login-input::placeholder{color:var(--t3)}
.login-input:focus{border-color:var(--g)}
.login-btn{width:100%;padding:16px;border-radius:14px;background:linear-gradient(135deg,var(--g),#b8943f);color:var(--bg);font-size:16px;font-weight:700;letter-spacing:.3px;box-shadow:0 8px 32px var(--gg);transition:transform .15s,box-shadow .15s;position:relative;overflow:hidden}
.login-btn:active{transform:scale(.97)}
.login-btn .btn-ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.3);width:10px;height:10px;animation:ripple .6s ease-out}
.login-or{text-align:center;color:var(--t3);font-size:13px;margin:20px 0;position:relative}
.login-or::before,.login-or::after{content:'';position:absolute;top:50%;width:calc(50% - 20px);height:1px;background:var(--bd)}
.login-or::before{left:0}
.login-or::after{right:0}
.login-social{display:flex;gap:12px}
.login-social button{flex:1;padding:14px;border-radius:14px;background:var(--sf);border:1px solid var(--bd);color:var(--t);font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px;transition:border-color .2s}
.login-social button:hover{border-color:var(--bdl)}
.login-skip{text-align:center;margin-top:20px}
.login-skip button{background:none;color:var(--t3);font-size:13px;text-decoration:underline;text-underline-offset:3px}

/* ═══ TOPBAR ═══ */
.topbar{position:sticky;top:0;z-index:50;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;background:rgba(9,9,11,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);transition:transform .3s}
.topbar-left{display:flex;align-items:center;gap:14px}
.topbar-left .menu-btn{background:none;padding:0;display:flex;color:var(--t);transition:transform .2s}
.topbar-left .menu-btn:active{transform:scale(.85)}
.topbar-brand{font-family:var(--fd);font-size:18px;font-weight:800;color:var(--g);letter-spacing:3px}
.topbar-right{display:flex;gap:8px}
.topbar-icon{width:38px;height:38px;border-radius:var(--Rs);background:var(--sf);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;color:var(--t2);position:relative;transition:transform .15s,background .2s}
.topbar-icon:active{transform:scale(.9)}
.topbar-icon:hover{background:var(--el)}
.notif-dot{position:absolute;top:8px;right:8px;width:7px;height:7px;border-radius:50%;background:var(--r)}

/* ═══ DRAWER ═══ */
.drawer-overlay{position:fixed;inset:0;z-index:90;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);opacity:0;visibility:hidden;transition:all .35s}
.drawer-overlay.open{opacity:1;visibility:visible}
.drawer{position:fixed;top:0;bottom:0;left:-290px;width:280px;z-index:100;background:var(--bg);border-right:1px solid var(--bd);display:flex;flex-direction:column;transition:left .35s cubic-bezier(.4,0,.2,1)}
.drawer.open{left:0}
.drawer-header{padding:28px 24px 20px;border-bottom:1px solid var(--bd)}
.drawer-brand{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.drawer-brand .d-logo{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,var(--g),#b8943f);display:flex;align-items:center;justify-content:center;color:var(--bg)}
.d-brand-text h3{font-family:var(--fd);color:var(--g);font-size:18px;font-weight:800;letter-spacing:3px}
.d-brand-text span{color:var(--t3);font-size:10px;letter-spacing:2px;text-transform:uppercase}
.drawer-user{display:flex;align-items:center;gap:10px}
.drawer-user .d-avatar{width:36px;height:36px;border-radius:10px;background:var(--el);display:flex;align-items:center;justify-content:center;color:var(--t2)}
.du-name{color:var(--t);font-size:14px;font-weight:600}
.du-tier{color:var(--g);font-size:11px;font-weight:600}
.drawer-nav{flex:1;padding:12px 0;overflow-y:auto}
.drawer-item{display:flex;align-items:center;gap:14px;padding:14px 24px;cursor:pointer;border-left:3px solid transparent;transition:all .2s;color:var(--t2);font-size:15px}
.drawer-item:hover,.drawer-item.active{background:var(--gd);border-left-color:var(--g);color:var(--t)}
.drawer-item.active .di-icon{color:var(--g)}
.di-icon{color:var(--t3);transition:color .2s}
.drawer-footer{padding:16px 24px;border-top:1px solid var(--bd)}
.drawer-footer .df-item{display:flex;align-items:center;gap:14px;padding:10px 0;color:var(--t3);font-size:14px;cursor:pointer;transition:color .2s}
.drawer-footer .df-item:hover{color:var(--t2)}

/* ═══ PAGES ═══ */
.page{display:none;padding:0 20px 100px;min-height:calc(100vh - 60px)}
.page.active{display:block}
.page-transition{animation:fadeUp .35s ease-out}
.sec-title{margin-bottom:20px}
.sec-title h2{font-family:var(--fd);font-size:22px;font-weight:700;letter-spacing:-.3px;color:var(--t)}
.sec-title p{color:var(--t3);font-size:13px;margin-top:4px}

/* ═══ CARDS ═══ */
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--R);padding:20px;transition:all .25s cubic-bezier(.4,0,.2,1)}
.card.glow{border-color:rgba(200,168,76,.25);box-shadow:0 0 40px var(--gg)}
.card.clickable{cursor:pointer}
.card.clickable:hover{border-color:var(--bdl);transform:translateY(-2px)}
.card.clickable:active{transform:translateY(0) scale(.98)}

/* ═══ CHIPS ═══ */
.chip{display:inline-block;padding:3px 10px;border-radius:6px;font-size:10px;font-weight:700;font-family:var(--fd);letter-spacing:.8px;text-transform:uppercase}
.cg{background:var(--gd);color:var(--g)}.cgr{background:var(--grd);color:var(--gr)}
.ca{background:var(--acd);color:var(--ac)}.cr{background:var(--rd);color:var(--r)}

/* ═══ BUTTONS ═══ */
.btn{display:inline-flex;align-items:center;justify-content:center;border-radius:14px;font-family:var(--fd);letter-spacing:.3px;transition:all .2s;position:relative;overflow:hidden}
.btn:active{transform:scale(.97)}
.btn-g{padding:14px 28px;background:linear-gradient(135deg,var(--g),#b8943f);color:var(--bg);font-size:15px;font-weight:700;box-shadow:0 8px 32px var(--gg);width:100%}
.btn-g:disabled{background:var(--el);color:var(--t3);box-shadow:none;opacity:.4;cursor:not-allowed;transform:none}
.btn-go{padding:14px 28px;background:transparent;border:1.5px solid var(--g);color:var(--g);font-size:15px;font-weight:700;width:100%}
.btn-gs{padding:8px 18px;border-radius:10px;font-size:13px;background:linear-gradient(135deg,var(--g),#b8943f);color:var(--bg);font-weight:700}
.btn-os{padding:8px 18px;border-radius:10px;font-size:13px;background:transparent;border:1.5px solid var(--g);color:var(--g);font-weight:700}

/* ═══ PILLS ═══ */
.pills{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:24px}
.pill{padding:8px 20px;border-radius:100px;background:var(--el);color:var(--t2);font-size:13px;font-weight:600;font-family:var(--fd);white-space:nowrap;transition:all .25s}
.pill.on{background:var(--g);color:var(--bg)}

/* ═══ ICON BOXES ═══ */
.ib{display:flex;align-items:center;justify-content:center;border-radius:14px;flex-shrink:0}
.ib-l{width:52px;height:52px}.ib-m{width:44px;height:44px;border-radius:12px}.ib-s{width:36px;height:36px;border-radius:10px}

/* ═══ FAB ═══ */
.fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,var(--g),#b8943f);display:flex;align-items:center;justify-content:center;z-index:40;cursor:pointer;box-shadow:0 8px 32px var(--gg),0 2px 8px rgba(0,0,0,.4);transition:transform .2s;color:var(--bg)}
.fab:hover{transform:scale(1.08)}
.fab:active{transform:scale(.95)}

/* ═══ PROGRESS ═══ */
.ptrack{height:3px;background:var(--el);border-radius:2px;overflow:hidden}
.pfill{height:100%;border-radius:2px;transition:width .8s ease}

/* ═══ HOME ═══ */
.home-greet span{color:var(--t3);font-size:13px;display:block;margin-bottom:4px}
.home-greet h1{font-family:var(--fd);font-size:28px;font-weight:800;letter-spacing:-.5px}
.qgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.qitem{display:flex;align-items:center;gap:14px;padding:16px;cursor:pointer}
.qitem .ql{color:var(--t);font-weight:600;font-size:14px;font-family:var(--fd)}

/* ═══ BOOKING ═══ */
.step-bar{display:flex;gap:6px;margin-bottom:28px}
.step-i{flex:1}.step-track{height:2px;border-radius:1px;margin-bottom:8px;transition:background .4s}
.step-lbl{font-size:11px;font-family:var(--fd)}
.scard{display:flex;align-items:center;gap:16px;padding:18px;cursor:pointer;margin-bottom:12px;transition:all .25s}
.scard:hover{border-color:rgba(200,168,76,.3);transform:translateY(-2px)}
.scard:active{transform:translateY(0)}
.sprice{text-align:right}
.sprice .amt{color:var(--g);font-weight:800;font-size:22px;font-family:var(--fd)}
.sprice .unit{color:var(--t3);font-size:11px}
.dscroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:24px}
.ditem{min-width:64px;padding:12px 8px;border-radius:14px;text-align:center;cursor:pointer;background:var(--el);border:1px solid var(--bd);transition:all .2s}
.ditem.on{background:var(--g);border-color:var(--g)}
.ditem .dd{font-size:11px;font-weight:500;margin-bottom:4px}
.ditem .dn{font-size:20px;font-weight:700;font-family:var(--fd)}
.ditem .dm{font-size:10px;margin-top:2px}
.ditem.on .dd,.ditem.on .dn,.ditem.on .dm{color:var(--bg)}
.ditem:not(.on) .dd{color:var(--t3)}.ditem:not(.on) .dn{color:var(--t)}.ditem:not(.on) .dm{color:var(--t3)}
.tgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:24px}
.tslot{padding:12px 4px;border-radius:var(--Rs);text-align:center;cursor:pointer;background:var(--el);border:1px solid var(--bd);font-size:13px;font-weight:600;font-family:var(--fd);color:var(--t);transition:all .2s}
.tslot.on{background:var(--g);border-color:var(--g);color:var(--bg)}
.tslot.bk{opacity:.2;cursor:not-allowed}
.drow{display:flex;gap:8px;margin-bottom:28px}
.dri{flex:1;padding:14px 0;border-radius:var(--Rs);text-align:center;cursor:pointer;background:var(--el);border:1px solid var(--bd);transition:all .2s}
.dri.on{background:var(--g);border-color:var(--g)}
.dri .drn{font-size:16px;font-weight:700;font-family:var(--fd)}
.dri .dru{font-size:11px;margin-left:2px}
.dri.on .drn,.dri.on .dru{color:var(--bg)}
.dri:not(.on) .drn{color:var(--t)}.dri:not(.on) .dru{color:var(--t3)}
.srow{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bd)}
.srow .sk{color:var(--t3);font-size:14px}.srow .sv{color:var(--t);font-size:14px;font-weight:500}
.stotal{display:flex;justify-content:space-between;padding-top:14px;margin-top:4px}
.stotal .sk{color:var(--t);font-size:16px;font-weight:600}
.stotal .sv{color:var(--g);font-size:22px;font-weight:800;font-family:var(--fd)}

/* ═══ FOOD ═══ */
.fheader{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.cart-badge{display:flex;align-items:center;gap:8px;padding:10px 16px;border-radius:14px;background:var(--gd);border:1px solid rgba(200,168,76,.2);cursor:pointer;transition:transform .15s}
.cart-badge:active{transform:scale(.95)}
.cart-badge span{color:var(--g);font-weight:700;font-size:14px;font-family:var(--fd)}
.fitem{display:flex;align-items:center;gap:14px;padding:16px 0;border-bottom:1px solid var(--bd)}
.finfo{flex:1}
.fname{display:flex;align-items:center;gap:8px}
.fname span{color:var(--t);font-weight:600;font-size:15px}
.fsub{color:var(--t3);font-size:12px;margin-top:3px}
.fprice{color:var(--g);font-weight:700;font-size:16px;font-family:var(--fd);margin-top:6px}
.qty{display:flex;align-items:center;gap:10px;background:var(--el);border-radius:var(--Rs);padding:8px 14px}
.qty button{background:none;padding:0;display:flex;color:var(--t2);transition:transform .15s}
.qty button:active{transform:scale(.8)}
.qty button.plus{color:var(--g)}
.qty .qn{color:var(--t);font-weight:700;min-width:20px;text-align:center;font-family:var(--fd)}

/* ═══ CHAT ═══ */
.chatwrap{display:flex;flex-direction:column;height:calc(100vh - 60px);position:relative}
.chhead{padding:14px 20px;background:var(--sf);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:14px}
.chname{color:var(--t);font-weight:600;font-size:15px;font-family:var(--fd)}
.chname .hash{color:var(--t3);font-weight:400}
.chdesc{color:var(--t3);font-size:11px}
.chside{position:absolute;top:0;left:-280px;bottom:0;width:260px;background:var(--bg);border-right:1px solid var(--bd);z-index:10;padding:20px 0;transition:left .3s cubic-bezier(.4,0,.2,1)}
.chside.open{left:0}
.chltitle{padding:0 20px 12px;color:var(--g);font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;font-family:var(--fd)}
.chi{display:flex;align-items:center;gap:12px;padding:12px 20px;cursor:pointer;border-left:3px solid transparent;transition:all .2s}
.chi.on{background:var(--gd);border-left-color:var(--g)}
.chi .chl{flex:1;font-size:14px;color:var(--t2)}.chi.on .chl{color:var(--t);font-weight:600}
.chur{background:var(--ac);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px}
.chmsgs{flex:1;overflow-y:auto;padding:20px}
.mrow{display:flex;gap:12px;margin-bottom:18px}
.mrow.me{flex-direction:row-reverse}
.mav{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;font-weight:700;font-family:var(--fd)}
.mbody{max-width:75%}
.mmeta{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.mrow.me .mmeta{flex-direction:row-reverse}
.muser{font-size:13px;font-weight:600;font-family:var(--fd)}
.mtime{color:var(--t3);font-size:10px}
.mbub{padding:10px 16px;border-radius:4px 16px 16px 16px;background:var(--sf);border:1px solid var(--bd);color:var(--t);font-size:14px;line-height:1.6}
.mrow.me .mbub{border-radius:16px 4px 16px 16px;background:var(--gd);border-color:rgba(200,168,76,.2)}
.chinput{padding:14px 20px;background:var(--sf);border-top:1px solid var(--bd);display:flex;gap:10px}
.chinp{flex:1;padding:12px 16px;border-radius:14px;border:1px solid var(--bd);background:var(--el);color:var(--t);font-size:14px;transition:border-color .2s}
.chinp:focus{border-color:rgba(200,168,76,.3)}
.chinp::placeholder{color:var(--t3)}

render.chatbot=()=>{

  let h=`<div class="botwrap"><div class="bothead"><div class="botav"><i data-lucide="bot" style="width:22px;height:22px"></i></div><div><div style="color:var(--t);font-weight:600;font-size:16px;font-family:var(--fd)">RazzBot</div><div class="botstatus"><span class="dot"></span><span>Live · Claude AI</span></div></div></div><div class="botmsgs" id="bMs">`;
  botMsgs.forEach(m=>{if(m.role==='assistant')h+=`<div class="bmsg"><div class="bmav"><i data-lucide="bot" style="width:16px;height:16px"></i></div><div class="bmbub">${m.content.replace(/\n/g,'<br>')}</div></div>`;else h+=`<div class="bmsg u"><div class="bmbub">${m.content}</div></div>`});
  if(botLoad)h+=`<div class="bmsg"><div class="bmav"><i data-lucide="bot" style="width:16px;height:16px;color:var(--g)"></i></div><div class="bmbub"><div class="tdots"><span></span><span></span><span></span></div></div></div>`;
  h+=`</div>`;
  if(botMsgs.length<=1&&!botLoad)h+=`<div class="bsug">${['Best Valorant agents?','PS5 vs PC for FPS?','Trending games?','Razz tournament info'].map(s=>`<div class="bsi" onclick="sendBot('${s}')">${s}</div>`).join('')}</div>`;
  h+=`<div class="botbar"><input class="botinp" id="bInp" placeholder="Ask anything about gaming..." onkeydown="if(event.key==='Enter')sendBot()"><button class="botsend" id="bSnd" onclick="sendBot()"><i data-lucide="send" style="width:18px;height:18px"></i></button></div></div>`;
  el.innerHTML=h;ic();const ms=document.getElementById('bMs');if(ms)ms.scrollTop=ms.scrollHeight;
  const inp=document.getElementById('bInp');if(inp)inp.addEventListener('input',()=>{document.getElementById('bSnd').className=inp.value.trim()?'botsend on':'botsend'});
};

const botFallback=`That's a great question! I'm still learning, but here's what I can help with:<br><br>• <strong>Game tips</strong> — Valorant, CS2, Elden Ring, and more<br>• <strong>Razz info</strong> — booking, pricing, food menu, tournaments<br>• <strong>Recommendations</strong> — what to play, best setups<br>• <strong>Loyalty</strong> — your points, tier perks, rewards<br><br>Try asking me something specific and I'll do my best!`;

async function sendBot(text){
  const inp=document.getElementById('bInp'),msg=text||(inp?inp.value.trim():'');
  if(!msg||botLoad)return;if(inp)inp.value='';
  botMsgs.push({role:'user',content:msg});botLoad=true;render.chatbot();ic();
  
  // Simulate realistic typing delay (800-1800ms)
  const delay=800+Math.random()*1000;
  await new Promise(r=>setTimeout(r,delay));
  
  // Smart keyword matching
  const low=msg.toLowerCase();
  const match=botDB.find(e=>e.k.some(k=>low.includes(k)));
  const reply=match?match.r:botFallback;
  
  botMsgs.push({role:'assistant',content:reply});
  botLoad=false;render.chatbot();ic();
}
